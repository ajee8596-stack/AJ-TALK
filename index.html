<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJ Talk | Private Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #00a884; --text: #e9edef; --msg-me: #005c4b; --msg-them: #202c33; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .screen { display: none; height: 100%; flex-direction: column; animation: fadeIn 0.3s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Auth UI --- */
        .auth-container { padding: 50px 20px; text-align: center; }
        .auth-card { background: var(--header); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: #2a3942; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--green); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* --- Dashboard UI --- */
        .header { background: var(--header); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .user-item { padding: 15px; border-bottom: 1px solid #202c33; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .user-item:active { background: #2a3942; }
        .avatar { width: 48px; height: 48px; background: #6a7175; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* --- Chat UI --- */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .sent { align-self: flex-end; background: var(--msg-me); border-top-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--msg-them); border-top-left-radius: 2px; }

        .input-bar { background: var(--header); padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .send-circle { background: var(--green); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }

        /* --- Video UI --- */
        #video-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; }
        #remoteVid { width: 100%; height: 100%; object-fit: cover; }
        #localVid { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; border: 2px solid white; border-radius: 12px; object-fit: cover; }
        .call-controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; }
        .end-btn { background: #ff3b30; width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen active">
    <div class="auth-container">
        <div class="auth-card">
            <h1 style="color: var(--green); margin-bottom: 5px;">AJ Talk</h1>
            <p style="color: #8696a0; margin-top: 0; font-size: 14px;">Secure & Private</p>
            <input type="text" id="regName" placeholder="Full Name (for Signup)">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Login</button>
            <button class="btn" style="background: transparent; color: var(--green); margin-top: 15px;" onclick="handleAuth('signup')">New here? Create Account</button>
        </div>
    </div>
</div>

<div id="dash-screen" class="screen">
    <div class="header">
        <div style="font-weight: bold; font-size: 20px; color: var(--green);">AJ Talk</div>
        <button onclick="auth.signOut()" style="background:none; border:none; color:#ff3b30; font-weight:bold;">Logout</button>
    </div>
    <div style="padding: 12px;">
        <input type="text" id="searchInp" placeholder="Search by email..." oninput="searchUsers()" style="margin:0;">
    </div>
    <div id="user-list" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="chat-screen" class="screen">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="showScreen('dash-screen')" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <span id="chatTitle" style="font-weight: 500;">User Name</span>
        </div>
        <button onclick="startCall()" style="background:none; border:none; padding:5px;">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
    </div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Message" style="margin:0; border-radius: 25px;">
        <button class="send-circle" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<div id="video-ui">
    <video id="remoteVid" autoplay playsinline></video>
    <video id="localVid" autoplay muted playsinline></video>
    <div class="call-controls">
        <button class="end-btn" onclick="location.reload()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
    </div>
</div>

<script>
    // --- INSERT FIREBASE CONFIG HERE ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let activePartnerUID = null;
    let activeRoomID = null;

    // --- AUTHENTICATION ---
    function handleAuth(mode) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('regName').value;

        if (mode === 'signup') {
            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                db.collection('users').doc(res.user.uid).set({ name, email, uid: res.user.uid });
            }).catch(e => alert(e.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) { showScreen('dash-screen'); loadUsers(); }
        else { showScreen('auth-screen'); }
    });

    // --- DASHBOARD ---
    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                if (doc.id !== auth.currentUser.uid) {
                    const u = doc.data();
                    list.innerHTML += `<div class="user-item" onclick="openChat('${u.uid}', '${u.name}')">
                        <div class="avatar">${u.name[0]}</div>
                        <div><div style="font-weight:bold;">${u.name}</div><small style="color:#8696a0;">${u.email}</small></div>
                    </div>`;
                }
            });
        });
    }

    function searchUsers() {
        const val = document.getElementById('searchInp').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(item => {
            const email = item.querySelector('small').innerText.toLowerCase();
            item.style.display = email.includes(val) ? 'flex' : 'none';
        });
    }

    // --- CHAT LOGIC ---
    function openChat(uid, name) {
        activePartnerUID = uid;
        activeRoomID = auth.currentUser.uid < uid ? auth.currentUser.uid + "_" + uid : uid + "_" + auth.currentUser.uid;
        document.getElementById('chatTitle').innerText = name;
        showScreen('chat-screen');
        listenMessages();
    }

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if (!text) return;
        db.collection('chats').doc(activeRoomID).collection('messages').add({
            text, sender: auth.currentUser.uid, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('msgInput').value = '';
    }

    function listenMessages() {
        db.collection('chats').doc(activeRoomID).collection('messages').orderBy('time').onSnapshot(snap => {
            const box = document.getElementById('chat-window');
            box.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                const d = document.createElement('div');
                d.className = `msg ${m.sender === auth.currentUser.uid ? 'sent' : 'received'}`;
                d.innerText = m.text;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startCall() {
        document.getElementById('video-ui').style.display = 'block';
        // Add WebRTC Offer/Answer logic here
    }
</script>
</body>
</html>
