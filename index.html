<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJ Talk</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #00a884; --text: #e9edef; --msg-me: #005c4b; --msg-them: #202c33; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .screen { display: none; height: 100%; flex-direction: column; }
        .active { display: flex; }
        .auth-card { padding: 40px 20px; text-align: center; justify-content: center; display: flex; flex-direction: column; height: 100%; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--green); color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .header { background: var(--header); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0b141a; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--msg-me); }
        .received { align-self: flex-start; background: var(--msg-them); }
        .input-bar { background: var(--header); padding: 10px; display: flex; gap: 10px; }
        .user-item { padding: 15px; border-bottom: 1px solid #202c33; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; background: #6a7175; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen" class="screen active">
    <div class="auth-card">
        <h1 style="color: var(--green);">AJ Talk</h1>
        <input type="email" id="l-email" placeholder="Gmail Address">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn" onclick="login()">Login</button>
        <p onclick="showScreen('signup-screen')" style="color:var(--green); margin-top:20px;">Create New Account</p>
    </div>
</div>

<div id="signup-screen" class="screen">
    <div class="auth-card">
        <h1>Register</h1>
        <input type="text" id="r-name" placeholder="Full Name">
        <input type="email" id="r-email" placeholder="Gmail Address">
        <input type="password" id="r-pass" placeholder="Create Password">
        <button class="btn" onclick="signup()">Sign Up</button>
        <p onclick="showScreen('login-screen')" style="color:var(--green); margin-top:20px;">Already have an account? Login</p>
    </div>
</div>

<div id="dash-screen" class="screen">
    <div class="header">
        <span>AJ Talk</span>
        <span onclick="auth.signOut()" style="color: #ff3b30; font-size: 14px;">Logout</span>
    </div>
    <div style="padding: 10px;"><input type="text" id="search" placeholder="Search by email..." oninput="searchUsers()" style="margin:0;"></div>
    <div id="user-list" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="chat-screen" class="screen">
    <div class="header">
        <span onclick="showScreen('dash-screen')">← Back</span>
        <span id="chat-title">User</span>
        <span></span>
    </div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Type a message..." style="margin:0;">
        <button onclick="send()" style="background:var(--green); border:none; border-radius:50%; width:45px; color:white;">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCxlhIJe1MHCPOz6dVwGoGRWoM1ZBQqKYI",
        authDomain: "aj-talk-3c81a.firebaseapp.com",
        projectId: "aj-talk-3c81a",
        storageBucket: "aj-talk-3c81a.firebasestorage.app",
        messagingSenderId: "919184974247",
        appId: "1:919184974247:web:645db8e117f4e4ba575682"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let activeRoom = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function signup() {
        const n = document.getElementById('r-name').value;
        const e = document.getElementById('r-email').value.trim();
        const p = document.getElementById('r-pass').value;
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.collection('users').doc(res.user.uid).set({ name: n, email: e, uid: res.user.uid });
        }).catch(err => {
            if(err.code === 'auth/email-already-in-use') alert("Account already exists! Please Login.");
            else alert(err.message);
        });
    }

    function login() {
        const e = document.getElementById('l-email').value.trim();
        const p = document.getElementById('l-pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) { showScreen('dash-screen'); loadUsers(); }
        else { showScreen('login-screen'); }
    });

    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                if(doc.id !== auth.currentUser.uid) {
                    const u = doc.data();
                    list.innerHTML += `<div class="user-item" onclick="openChat('${u.uid}', '${u.name}')">
                        <div class="avatar">${u.name[0].toUpperCase()}</div>
                        <div><b>${u.name}</b><br><small style="color:#8696a0">${u.email}</small></div>
                    </div>`;
                }
            });
        });
    }

    function openChat(uid, name) {
        activeRoom = auth.currentUser.uid < uid ? auth.currentUser.uid+"_"+uid : uid+"_"+auth.currentUser.uid;
        document.getElementById('chat-title').innerText = name;
        showScreen('chat-screen');
        db.collection('chats').doc(activeRoom).collection('messages').orderBy('time').onSnapshot(snap => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                win.innerHTML += `<div class="msg ${m.sender === auth.currentUser.uid ? 'sent' : 'received'}">${m.text}</div>`;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('msg-input').value;
        if(!t) return;
        db.collection('chats').doc(activeRoom).collection('messages').add({
            text: t, sender: auth.currentUser.uid, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('msg-input').value = '';
    }

    function searchUsers() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(it => {
            it.style.display = it.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
