<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJ Talk | Private Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #00a884; --text: #e9edef; --msg-me: #005c4b; --msg-them: #202c33; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .screen { display: none; height: 100%; flex-direction: column; animation: fadeIn 0.3s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Auth Styles */
        .auth-container { padding: 50px 20px; text-align: center; }
        .auth-card { background: var(--header); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: #2a3942; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--green); color: white; font-weight: bold; cursor: pointer; }
        
        /* Dashboard Styles */
        .header { background: var(--header); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .user-item { padding: 15px; border-bottom: 1px solid #202c33; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 48px; height: 48px; background: #6a7175; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Chat Styles */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--msg-me); border-top-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--msg-them); border-top-left-radius: 2px; }
        .input-bar { background: var(--header); padding: 10px 15px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen active">
    <div class="auth-container">
        <div class="auth-card">
            <h1 style="color: var(--green); margin-bottom: 5px;">AJ Talk</h1>
            <p style="color: #8696a0; margin-top: 0; font-size: 14px;">Secure Private Messaging</p>
            <input type="text" id="regName" placeholder="Full Name (for Signup)">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Login</button>
            <button class="btn" style="background: transparent; color: var(--green); margin-top: 15px;" onclick="handleAuth('signup')">Create New Account</button>
        </div>
    </div>
</div>

<div id="dash-screen" class="screen">
    <div class="header">
        <div style="font-weight: bold; font-size: 20px; color: var(--green);">AJ Talk</div>
        <button onclick="auth.signOut()" style="background:none; border:none; color:#ff3b30; font-weight:bold;">Logout</button>
    </div>
    <div style="padding: 10px;">
        <input type="text" id="searchInp" placeholder="Search by email..." oninput="searchUsers()" style="margin:0;">
    </div>
    <div id="user-list" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="chat-screen" class="screen">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <button onclick="showScreen('dash-screen')" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <span id="chatTitle" style="font-weight: 500;">User Name</span>
        </div>
    </div>
    <div id="chat-window"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Message" style="margin:0; border-radius: 25px;">
        <button onclick="sendMessage()" style="background:var(--green); border:none; border-radius:50%; width:45px; height:45px; color:white; flex-shrink:0;">➤</button>
    </div>
</div>

<script>
    // --- INTEGRATED NAYI CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCxlhIJe1MHCPOz6dVwGoGRWoM1ZBQqKYI",
        authDomain: "aj-talk-3c81a.firebaseapp.com",
        projectId: "aj-talk-3c81a",
        storageBucket: "aj-talk-3c81a.firebasestorage.app",
        messagingSenderId: "919184974247",
        appId: "1:919184974247:web:645db8e117f4e4ba575682",
        measurementId: "G-RNZZWEYJHX"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let activePartnerUID = null;
    let activeRoomID = null;

    // Authentication Logic
    function handleAuth(mode) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('regName').value;

        if (mode === 'signup') {
            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                db.collection('users').doc(res.user.uid).set({ name, email, uid: res.user.uid });
            }).catch(e => alert(e.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) { showScreen('dash-screen'); loadUsers(); }
        else { showScreen('auth-screen'); }
    });

    // Load Users
    function loadUsers() {
        db.collection('users').onSnapshot(snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                if (doc.id !== auth.currentUser.uid) {
                    const u = doc.data();
                    list.innerHTML += `<div class="user-item" onclick="openChat('${u.uid}', '${u.name}')">
                        <div class="avatar">${u.name[0]}</div>
                        <div><div style="font-weight:bold;">${u.name}</div><small style="color:#8696a0;">${u.email}</small></div>
                    </div>`;
                }
            });
        });
    }

    // Chat Logic
    function openChat(uid, name) {
        activePartnerUID = uid;
        activeRoomID = auth.currentUser.uid < uid ? auth.currentUser.uid + "_" + uid : uid + "_" + auth.currentUser.uid;
        document.getElementById('chatTitle').innerText = name;
        showScreen('chat-screen');
        listenMessages();
    }

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        if (!text) return;
        db.collection('chats').doc(activeRoomID).collection('messages').add({
            text, sender: auth.currentUser.uid, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('msgInput').value = '';
    }

    function listenMessages() {
        db.collection('chats').doc(activeRoomID).collection('messages').orderBy('time').onSnapshot(snap => {
            const box = document.getElementById('chat-window');
            box.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                const d = document.createElement('div');
                d.className = `msg ${m.sender === auth.currentUser.uid ? 'sent' : 'received'}`;
                d.innerText = m.text;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function searchUsers() {
        const val = document.getElementById('searchInp').value.toLowerCase();
        document.querySelectorAll('.user-item').forEach(item => {
            const email = item.querySelector('small').innerText.toLowerCase();
            item.style.display = email.includes(val) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
